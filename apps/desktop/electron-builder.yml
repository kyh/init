appId: com.init.electron
productName: Init
directories:
  buildResources: resources
  output: .output/bin
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
asarUnpack:
  - resources/**
mac:
  artifactName: Init-${version}-${arch}-mac.${ext}
  category: public.app-category.productivity
  icon: resources/icon.icns
  entitlementsInherit: resources/entitlements.mac.plist
  # extendInfo is a mapping merged into Info.plist — dash-prefixed entries make
  # it a sequence, and the array indices become the plist keys. Add a privacy
  # string only when the app actually reaches for that resource; the shell
  # doesn't, and pickFolder's open dialog is user-initiated, so macOS grants it
  # without one.
  # extendInfo:
  #   NSCameraUsageDescription: Explain why this app needs the camera.
  notarize: false
dmg:
  artifactName: Init-${version}-${arch}.${ext}
npmRebuild: false
# Required for electron-updater — configure before shipping.
# See: https://www.electron.build/publish
# publish:
#   provider: github
